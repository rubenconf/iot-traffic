<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        #camera-slider {
            background: linear-gradient(to right, white var(--range-progress, 10%), black var(--range-progress, 10%));
            outline: none;
        }

        #camera-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 8px;
            height: 24px;
            background: white;
            cursor: pointer;
            border-radius: 2px;
            margin-top: -0px; /* Centrar respecto al track de 8px */
        }

        #camera-slider::-moz-range-thumb {
            width: 8px;
            height: 24px;
            background: white;
            cursor: pointer;
            border-radius: 2px;
            border: none;
        }

        #camera-slider::-moz-range-progress {
            background-color: white;
            height: 8px;
            border-radius: 8px 0 0 8px;
        }
    </style>
    <title>IoT Traffic</title>
</head>
<body class="w-screen h-screen flex items-center justify-center bg-white">
    <button id="menu-btn" class="fixed top-4 right-4 p-2 rounded-full cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#000000" viewBox="0 0 256 256">
            <path d="M228,128a12,12,0,0,1-12,12H40a12,12,0,0,1,0-24H216A12,12,0,0,1,228,128ZM40,76H216a12,12,0,0,0,0-24H40a12,12,0,0,0,0,24ZM216,180H40a12,12,0,0,0,0,24H216a12,12,0,0,0,0-24Z"></path>
        </svg>
    </button>
    <div class="fixed top-4 left-4 p-2 rounded-full cursor-pointer" id="start-btn">
        <span id="countdown-text" class="text-4xl font-mono">--:--</span>
    </div>
    <div id="floating-window" class="hidden fixed top-4 right-4 w-64 h-64 bg-black rounded-lg shadow-2xl overflow-visible border-4 border-gray-700 z-40 min-w-[256px] min-h-[256px]">
        <button id="close-btn"
            class="absolute top-0 right-0 p-2 bg-transparent text-white hover:text-gray-300 transition-colors cursor-pointer z-50">
            <svg xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="currentColor"
                viewBox="0 0 256 256">
                <path d="M208.49,191.51a12,12,0,0,1-17,17L128,145,64.49,208.49a12,12,0,0,1-17-17L111,128,47.51,64.49a12,12,0,0,1,17-17L128,111l63.51-63.52a12,12,0,0,1,17,17L145,128Z"></path>
            </svg>
        </button>

        <div class="p-4 text-white h-full w-full overflow-auto pt-12 flex flex-col space-y-4">
            <div class="container" id="video-container">
                <div id="videoFeedContainer">
                    <div id="videoPlaceholder" class="camera-status">
                        <img src="./img/no-face.svg" alt="Searching webcam">
                        <p class="feedback-text">Searching Webcam...</p>
                    </div>
                    <iframe id="dynamicIframe" title="Video stream" width="1024px" height="768px" frameBorder="0" style="display: none;"></iframe>
                </div>
            </div>
        </div>

        <div id="resize-handle"
            class="absolute bottom-1 left-1 w-6 h-6 cursor-sw-resize flex items-center justify-center p-1 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="#fff"
                class="rotate-90"
                viewBox="0 0 256 256">
                <path d="M216.49,136.49l-80,80a12,12,0,1,1-17-17l80-80a12,12,0,1,1,17,17Zm-16-105a12,12,0,0,0-17,0l-152,152a12,12,0,0,0,17,17l152-152A12,12,0,0,0,200.49,31.51Z"></path>
            </svg>
        </div>

        <div class="absolute -bottom-20 -left-1 w-full z-[999] flex flex-col items-start space-y-[2px]">
            <p class="text-sm font-mono">Confidence Filter</p>
            <div class="bg-gray-700 backdrop-blur-md rounded-lg py-2 border-4 px-4 border-gray-700 shadow-xl w-full">
                <div class="flex items-center space-x-3">
                    <input type="range"
                        id="confidenceSlider"
                        min="0"
                        max="1"
                        step="0.01"
                        value="0.10"
                        class="flex-1 h-2 rounded-lg appearance-none cursor-pointer">

                    <span id="slider-value"
                        class="text-sm font-mono w-10 text-right text-white">
                        0.10
                    </span>
                </div>
            </div>
        </div>

    </div>

    <div class="flex flex-row space-x-12 items-end justify-center">
        <div class="p-[6px] bg-[#ffae00] flex items-center justify-center flex-col space-y-[6px] rounded-[30px] border-4 border-[#cc8b00] shadow-2xl">
            <div class="w-[120px] h-[120px] bg-[#000] rounded-[23px] p-4">
                <div class="w-full h-full bg-[#111] rounded-full flex items-center justify-center">
                    <div id="red-car" class="hidden w-full h-full bg-[#FF0000] rounded-full shadow-[0_0_20px_#FF0000]"></div>
                </div>
            </div>
            <div class="w-[120px] h-[120px] bg-[#000] rounded-[23px] p-4">
                <div class="w-full h-full bg-[#111] rounded-full flex items-center justify-center">
                    <div id="yellow-car" class="hidden w-full h-full bg-[#FFFF00] rounded-full shadow-[0_0_20px_#FFFF00]"></div>
                </div>
            </div>
            <div class="w-[120px] h-[120px] bg-[#000] rounded-[23px] p-4">
                <div class="w-full h-full bg-[#111] rounded-full flex items-center justify-center">
                    <div id="green-car" class="w-full h-full bg-[#00FF00] rounded-full shadow-[0_0_20px_#00FF00]"></div>
                </div>
            </div>
        </div>
        <div class="p-[6px] bg-[#ffae00] flex items-center justify-center flex-col space-y-[6px] rounded-[30px] border-4 border-[#cc8b00] shadow-2xl">
            <div class="w-[120px] h-[120px] bg-[#000] rounded-[23px] text-white text-center flex items-center justify-center p-4">
                <div class="w-full h-full bg-[#111] rounded-full flex items-center justify-center">
                    <svg id="red-person" xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#FF0000" viewBox="0 0 256 256" style="filter: drop-shadow(0 0 10px #FF0000);"><path d="M128,84A36,36,0,1,0,92,48,36,36,0,0,0,128,84Zm0-48a12,12,0,1,1-12,12A12,12,0,0,1,128,36ZM234.29,138.17a12,12,0,0,1-16.47,4.12c-.32-.19-32.37-18.92-77.82-21.88v27L201,216A12,12,0,1,1,183,232l-55-61.91L73,232A12,12,0,1,1,55,216l61-68.59v-27c-45.72,2.95-77.48,21.68-77.82,21.89a12,12,0,1,1-12.35-20.58C27.58,120.66,69.35,96,128,96s100.42,24.66,102.17,25.71A12,12,0,0,1,234.29,138.17Z"></path></svg>
                </div>
            </div>
            <div class="w-[120px] h-[120px] bg-[#000] rounded-[23px] p-4">
                <div class="w-full h-full bg-[#111] rounded-full flex items-center justify-center">
                    <svg id="green-person" class="hidden" xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#00FF00" viewBox="0 0 256 256" style="filter: drop-shadow(0 0 10px #00FF00);"><path d="M152,92a36,36,0,1,0-36-36A36,36,0,0,0,152,92Zm0-48a12,12,0,1,1-12,12A12,12,0,0,1,152,44Zm76,93.4a12,12,0,0,1-7,10.91,66,66,0,0,1-21.47,3.78c-14,0-34.25-3.82-59.77-19a177,177,0,0,1-10.27,21C153.12,162.83,188,183.8,188,232a12,12,0,0,1-24,0c0-18.69-6.95-33.06-21.26-43.94-9.16-7-19.55-11-27.43-13.34-.81,1-1.64,2-2.5,2.95-20,22.87-44.82,34.76-72.25,34.76a97.33,97.33,0,0,1-9.75-.49,12,12,0,1,1,2.39-23.88c52.3,5.22,77.48-45.92,85.79-67.75C84.8,102.46,63.74,118.78,63.51,119a12,12,0,0,1-15-18.72C50.08,99,88,69.44,142.75,106.62c43.1,29.31,68.1,19.92,68.5,19.76a12,12,0,0,1,16.75,11Z"></path></svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-btn');
        const floatingWindow = document.getElementById('floating-window');
        const resizeHandle = document.getElementById('resize-handle');
        const cameraSlider = document.getElementById('confidenceSlider');
        const sliderValue = document.getElementById('slider-value');

        // Lógica del Slider manual
        const updateSliderProgress = (val) => {
            const percentage = (val - cameraSlider.min) / (cameraSlider.max - cameraSlider.min) * 100;
            cameraSlider.style.setProperty('--range-progress', `${percentage}%`);
        };

        cameraSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value).toFixed(2);
            sliderValue.innerText = val;
            updateSliderProgress(e.target.value);
        });

        // Inicializar progreso
        updateSliderProgress(cameraSlider.value);

        const toggleWindow = () => {
            floatingWindow.classList.toggle('hidden');
        };

        menuBtn.addEventListener('click', toggleWindow);
        closeBtn.addEventListener('click', toggleWindow);

        // Lógica para redimensionar desde la izquierda abajo
        let isResizing = false;

        resizeHandle.addEventListener('mousedown', (e) => {
            isResizing = true;
            e.preventDefault();
        });

        window.addEventListener('mousemove', (e) => {
            if (!isResizing) return;

            const rect = floatingWindow.getBoundingClientRect();
            
            // Calculamos el nuevo ancho basándonos en que la ventana está anclada a la derecha
            const newWidth = rect.right - e.clientX;
            
            // Calculamos el nuevo alto basándonos en la posición Y del ratón respecto al borde superior
            const newHeight = e.clientY - rect.top;

            // Definir límites máximos (respetando top-16 y bottom-4)
            const maxHeight = window.innerHeight - 64 - 16; // 64px (top-16) + 16px (bottom-4)
            const maxWidth = window.innerWidth - 32; // 16px (right-4) + 16px (margen izquierdo simétrico)
            const maxSize = Math.min(maxHeight, maxWidth);

            // Forzar que sea cuadrado usando el valor más grande, pero limitado por el mínimo y el máximo
            let size = Math.max(newWidth, newHeight, 256);
            size = Math.min(size, maxSize);

            floatingWindow.style.width = `${size}px`;
            floatingWindow.style.height = `${size}px`;
        });

        window.addEventListener('mouseup', () => {
            isResizing = false;
        });
    </script>
    
    <script>
        const iframe = document.getElementById('dynamicIframe');
        const placeholder = document.getElementById('videoPlaceholder');
        const currentHostname = window.location.hostname;
        const targetPort = 4912;
        const targetPath = '/embed';
        const streamUrl = `http://${currentHostname}:${targetPort}${targetPath}`;

        let intervalId;

        iframe.onload = () => {
            if (intervalId) {
                clearInterval(intervalId);
            }
            placeholder.style.display = 'none';
            iframe.style.display = 'block';
        };

        const startLoading = () => {
            // Set the src to start loading
            iframe.src = streamUrl;
        };

        intervalId = setInterval(startLoading, 1000); // Try to load every second
    </script>

    <script src="libs/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
