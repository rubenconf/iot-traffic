    <script>
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-btn');
        const floatingWindow = document.getElementById('floating-window');
        const resizeHandle = document.getElementById('resize-handle');
        const cameraSlider = document.getElementById('confidenceSlider');
        const sliderValue = document.getElementById('slider-value');

        // Lógica del Slider manual
        const updateSliderProgress = (val) => {
            const percentage = (val - cameraSlider.min) / (cameraSlider.max - cameraSlider.min) * 100;
            cameraSlider.style.setProperty('--range-progress', `${percentage}%`);
        };

        cameraSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value).toFixed(2);
            sliderValue.innerText = val;
            updateSliderProgress(e.target.value);
        });

        // Inicializar progreso
        updateSliderProgress(cameraSlider.value);

        const toggleWindow = () => {
            floatingWindow.classList.toggle('hidden');
        };

        menuBtn.addEventListener('click', toggleWindow);
        closeBtn.addEventListener('click', toggleWindow);

        // Lógica para redimensionar desde la izquierda abajo
        let isResizing = false;

        resizeHandle.addEventListener('mousedown', (e) => {
            isResizing = true;
            e.preventDefault();
        });

        window.addEventListener('mousemove', (e) => {
            if (!isResizing) return;

            const rect = floatingWindow.getBoundingClientRect();

            // Nuevo ancho desde la derecha
            let newWidth = rect.right - e.clientX;

            // Límites
            const minWidth = 320;
            const maxWidth = window.innerWidth - 32;

            newWidth = Math.max(minWidth, Math.min(newWidth, maxWidth));

            // Aspect ratio horizontal 16:9
            const aspectRatio = 4 / 3;

            let newHeight = newWidth / aspectRatio;

            // Limitar altura máxima
            const maxHeight = window.innerHeight - 80;

            if (newHeight > maxHeight) {
                newHeight = maxHeight;
                newWidth = newHeight * aspectRatio;
            }

            floatingWindow.style.width = `${newWidth}px`;
            floatingWindow.style.height = `${newHeight}px`;
        });

        window.addEventListener('mouseup', () => {
            isResizing = false;
        });
    </script>
